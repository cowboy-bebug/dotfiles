# REF: https://github.com/ianyh/Amethyst/blob/development/.amethyst.sample.yml
layouts:
  - two-pane
  - middle-wide
  - tall
  - fullscreen
  - column

mod1:
  - shift
  - command
mod2:
  - shift
  - control
  - command

# NOTE: mod3 is a dedicated unset modifier. Any binding set to mod3 is
# effectively disabled since `UNSET` maps to no key.
mod3: [alt]

window-margins: true
window-margin-size: 8
float-small-windows: true
focus-follows-mouse: false
enables-layout-hud: true
enables-layout-hud-on-space-change: true
follow-space-thrown-windows: true
hide-menu-bar-icon: false

focus-main:
  mod: mod2
  key: m

focus-cw:
  mod: mod1
  key: j
focus-ccw:
  mod: mod1
  key: k

focus-screen-ccw:
  mod: mod2
  key: p
focus-screen-cw:
  mod: mod2
  key: n

focus-screen-1:
  mod: mod2
  key: q
focus-screen-2:
  mod: mod2
  key: w
focus-screen-3:
  mod: mod3
  key: UNSET
focus-screen-4:
  mod: mod3
  key: UNSET
focus-screen-5:
  mod: mod3
  key: UNSET
throw-screen-1:
  mod: mod3
  key: UNSET
throw-screen-2:
  mod: mod3
  key: UNSET
throw-screen-3:
  mod: mod3
  key: UNSET
throw-screen-4:
  mod: mod3
  key: UNSET
throw-screen-5:
  mod: mod3
  key: UNSET
throw-space-1:
  mod: mod2
  key: 1
throw-space-2:
  mod: mod2
  key: 2
throw-space-3:
  mod: mod2
  key: 3
throw-space-4:
  mod: mod2
  key: 4
throw-space-5:
  mod: mod2
  key: 5
throw-space-6:
  mod: mod2
  key: 6
throw-space-7:
  mod: mod2
  key: 7
throw-space-8:
  mod: mod2
  key: 8
throw-space-9:
  mod: mod2
  key: 9
throw-space-10:
  mod: mod3
  key: UNSET

select-wide-layout:
  mod: mod3
  key: UNSET
select-column-layout:
  mod: mod3
  key: UNSET

select-two-pane-layout:
  mod: mod2
  key: 2
select-middle-wide-layout:
  mod: mod2
  key: w
select-tall-layout:
  mod: mod2
  key: t
select-fullscreen-layout:
  mod: mod2
  key: f

swap-cw:
  mod: mod2
  key: j
swap-ccw:
  mod: mod2
  key: k

toggle-focus-follows-mouse:
  mod: mod3
  key: UNSET
toggle-global-tiling:
  mod: mod3
  key: UNSET

reevaluate-windows:
  mod: mod2
  key: z

relaunch-amethyst:
  mod: mod2
  key: x
